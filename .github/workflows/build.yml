name: Build

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: linux
            goarch: arm
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64
          - goos: android
            goarch: arm64
          - goos: android
            goarch: arm

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Set up Android NDK
        if: matrix.goos == 'android'
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r26d

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          ext=""
          if [ "$GOOS" = "windows" ]; then
            ext=".exe"
          fi

          if [ "$GOOS" = "android" ]; then
            export CGO_ENABLED=1
            export TOOLCHAIN="$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin"
            export GOARM=""
            if [ "$GOARCH" = "arm64" ]; then
              export CC="$TOOLCHAIN/aarch64-linux-android21-clang"
              export CXX="$TOOLCHAIN/aarch64-linux-android21-clang++"
            elif [ "$GOARCH" = "arm" ]; then
              export GOARM=7
              export CC="$TOOLCHAIN/armv7a-linux-androideabi21-clang"
              export CXX="$TOOLCHAIN/armv7a-linux-androideabi21-clang++"
            fi
          else
            export CGO_ENABLED=0
          fi

          go build -ldflags="-s -w" -o backup-converter-${GOOS}-${GOARCH}${ext}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: backup-converter-${{ matrix.goos }}-${{ matrix.goarch }}
          path: backup-converter-*

  release:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Update rolling release tag
        if: github.ref == 'refs/heads/main'
        run: |
          git tag -f main-build "${GITHUB_SHA}"
          git push origin refs/tags/main-build --force

      - name: Prepare release metadata
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            echo "RELEASE_TAG=${GITHUB_REF#refs/tags/}" >> "$GITHUB_ENV"
            echo "RELEASE_NAME=${GITHUB_REF#refs/tags/}" >> "$GITHUB_ENV"
            echo "RELEASE_PRERELEASE=false" >> "$GITHUB_ENV"
          else
            echo "RELEASE_TAG=main-build" >> "$GITHUB_ENV"
            echo "RELEASE_NAME=main-build" >> "$GITHUB_ENV"
            echo "RELEASE_PRERELEASE=true" >> "$GITHUB_ENV"
          fi

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: ${{ env.RELEASE_NAME }}
          prerelease: ${{ env.RELEASE_PRERELEASE }}
          target_commitish: ${{ github.sha }}
          files: artifacts/**
          overwrite_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}