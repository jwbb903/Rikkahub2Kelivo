name: Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goos: [linux, darwin, windows]
        goarch: [386, amd64, arm, arm64, mips, mipsle, mips64, mips64le]
        exclude:
          - goos: darwin
            goarch: 386
          - goos: windows
            goarch: arm
          - goos: windows
            goarch: arm64
          - goos: windows
            goarch: mips
          - goos: windows
            goarch: mipsle
          - goos: windows
            goarch: mips64
          - goos: windows
            goarch: mips64le

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          ext=""
          if [ "$GOOS" = "windows" ]; then
            ext=".exe"
          fi
          go build -ldflags="-s -w" -o backup-converter-${GOOS}-${GOARCH}${ext}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: backup-converter-${{ matrix.goos }}-${{ matrix.goarch }}
          path: backup-converter-*

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts/**
          draft: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}